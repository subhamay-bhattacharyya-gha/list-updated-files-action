name: 'Detect Modified Files'
description: 'Lists files modified since a specific Git ref and sets the output.'

inputs:
  ref:
    description: 'Git reference to compare against (e.g., HEAD^, main).'
    required: false
    default: 'HEAD^'
  github-token:
    description: 'GitHub token used for authentication (not currently used).'
    required: true

outputs:
  modified_files:
    description: 'A JSON array of modified file paths since the specified ref.'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Detect Modified Files
      runs:
        using: "node20"
        main: "main.js"
