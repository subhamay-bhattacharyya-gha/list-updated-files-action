name: "List Modified Files"
description: "Outputs a list of files modified in the current commit or between refs as a JSON array."

inputs:
  ref:
    description: "Git reference to compare against (default: HEAD^)"
    required: false
    default: "HEAD^"

outputs:
  modified-files:
    description: "JSON array of modified file names"

runs:
  using: "composite"
  steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Get list of modified files
      shell: bash
      run: |
        set -e
        echo "Comparing against ref: ${{ inputs.ref }}"
        
        # Try to get the diff; fallback to HEAD~1 if ref is invalid
        if git rev-parse "${{ inputs.ref }}" >/dev/null 2>&1; then
          REF=${{ inputs.ref }}
        else
          echo "⚠️ Ref ${{ inputs.ref }} is invalid, falling back to HEAD~1"
          REF="HEAD~1"
        fi

        MODIFIED=$(git diff --name-only $REF HEAD | jq -R -s -c 'split("\n") | map(select(length > 0))')

        echo "Modified files JSON: $MODIFIED"
        echo "modified-files=$MODIFIED" >> "$GITHUB_OUTPUT"
